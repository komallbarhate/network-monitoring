<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NetMon – Login</title>
  <meta name="description" content="NetMon Indigenous Network Monitoring System – Secure Login" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f0f4f8;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, #c7d9f0 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none; opacity: 0.6;
    }
    .orb { display: none; }
    .login-card {
      position: relative; z-index: 10;
      background: #ffffff;
      border: 1px solid #dbe8f4;
      border-radius: 20px;
      padding: 44px 38px;
      width: 420px;
      box-shadow: 0 4px 24px rgba(59,130,246,0.1), 0 1px 4px rgba(0,0,0,0.06);
      animation: slideUp 0.5s ease;
    }
    @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .logo { display: flex; align-items: center; gap: 11px; margin-bottom: 6px; }
    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 2px 10px rgba(59,130,246,0.3);
    }
    .logo-text { font-size: 22px; font-weight: 700; color: #0f172a; letter-spacing: -0.4px; }
    .logo-text span { color: #3b82f6; }
    .tagline { color: #64748b; font-size: 13px; margin-bottom: 28px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 7px; }
    input[type="text"], input[type="password"] {
      width: 100%;
      background: #f8fafc;
      border: 1px solid #dbe8f4;
      border-radius: 10px;
      padding: 12px 14px;
      color: #1e293b;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); background: #fff; }
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border: none; border-radius: 10px; padding: 13px;
      color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 2px 10px rgba(59,130,246,0.3); margin-top: 6px;
    }
    .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .btn-login.loading { opacity: 0.6; pointer-events: none; }
    .error-msg {
      background: #fff1f2; border: 1px solid #fecaca;
      border-radius: 9px; padding: 11px 14px;
      font-size: 13px; color: #dc2626; margin-top: 14px; display: none;
    }
    .divider { border: none; border-top: 1px solid #e2eaf4; margin: 24px 0; }
    .demo-creds {
      background: #f0f7ff; border: 1px solid #bfdbfe; border-radius: 11px; padding: 13px 15px;
    }
    .demo-creds p { font-size: 11px; color: #64748b; margin-bottom: 7px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px; }
    .cred-row { display: flex; justify-content: space-between; font-size: 13px; font-family: 'JetBrains Mono', monospace; margin-bottom: 4px; }
    .cred-row span:first-child { color: #6366f1; }
    .cred-row span:last-child { color: #3b82f6; font-weight: 600; }
    .pulse { display: inline-block; width: 7px; height: 7px; background: #22c55e; border-radius: 50%; animation: pulse 2s ease-in-out infinite; margin-right: 6px; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.4)} 50%{box-shadow:0 0 0 5px rgba(34,197,94,0)} }
    .status-bar { font-size: 12px; color: #64748b; display: flex; align-items: center; margin-bottom: 24px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 20px; padding: 5px 12px; width: fit-content; }
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="login-card">
    <div class="logo">
      <div class="logo-icon">🛡️</div>
      <div class="logo-text">Net<span>Mon</span></div>
    </div>
    <p class="tagline">Indigenous Network Monitoring &amp; Intrusion Detection</p>
    <div class="status-bar">
      <span class="pulse"></span>
      System Active &nbsp;|&nbsp; AI Engine Online &nbsp;|&nbsp; Real-time Monitoring
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-login" id="loginBtn">🔐 &nbsp;Secure Login</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>

    <hr class="divider" />
    <div class="demo-creds">
      <p>🔑 Demo Credentials</p>
      <div class="cred-row"><span>Admin:</span><span>admin / admin123</span></div>
      <div class="cred-row"><span>Viewer:</span><span>viewer / viewer123</span></div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');
      btn.classList.add('loading');
      btn.textContent = 'Authenticating…';
      err.style.display = 'none';

      const res = await fetch('/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (data.success) {
        btn.textContent = '✅ Redirecting…';
        window.location.href = '/dashboard';
      } else {
        err.textContent = data.message || 'Invalid credentials. Please try again.';
        err.style.display = 'block';
        btn.classList.remove('loading');
        btn.innerHTML = '🔐 &nbsp;Secure Login';
      }
    });
  </script>
</body>
</html>
